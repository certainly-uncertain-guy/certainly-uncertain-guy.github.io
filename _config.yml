# Site settings
title: Ashutosh Shukla

# This description goes at the bottom of the webpage
description: >-
  Ashutosh Shukla
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://ashutoshshuklaUT.github.io" # Replace username with your GitHub username
twitter_username: A_RShukla
github_username:  ashutoshshuklaUT
linkedin_username: ashutosh-ut-phd

# Build settings
markdown: kramdown
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Not part of the published site — design specs/plans, some of which contain
# literal {% %} Liquid syntax in code examples that would otherwise break the build.
exclude:
  - docs

# Default front matter
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      permalink: /:categories/:year/:month/:day/:title/
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"